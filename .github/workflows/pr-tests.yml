name: PR tests

# Three jobs:
#   - `unit` runs vitest on every push/PR. Runs from the branch's workflow
#     definition, so edits to tests/ or the workflow itself are validated
#     on the very PR that introduces them.
#   - `preview-integration` runs our live curl suite against the Vercel
#     preview once Vercel reports the deployment as successful. `deployment_status`
#     always uses the default branch's workflow, so this job only kicks in
#     for PRs opened *after* the workflow has merged to main.
#   - `prod-smoke` runs a subset of the curl suite (no Claude calls) against
#     the Production deployment once a main→prod deploy succeeds. Catches
#     env-var drift between Preview and Production without burning OAuth
#     quota or polluting the production client-tracking KV.
#
# Required repository secrets:
#   - API_KEY                : same value as the Vercel API_KEY env var
#                              (the proxy's own auth middleware reads it).
#   - VERCEL_BYPASS_TOKEN    : Vercel → Project Settings → Deployment
#                              Protection → "Protection Bypass for
#                              Automation" token. Bypasses the SSO page
#                              that fronts preview deployments.

on:
  pull_request:
  push:
    branches: [main]
  deployment_status:

jobs:
  unit:
    name: Unit tests + typecheck
    if: github.event_name != 'deployment_status'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  preview-integration:
    name: Proxy integration tests (preview)
    # Only react to successful Vercel Preview deployments. Skip Production
    # (we don't want PR CI to hit prod) and skip intermediate states
    # (pending, in_progress, failure).
    if: >-
      github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Preview'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v4
        with:
          # Pin to the exact commit Vercel deployed, not the branch tip
          # (branch may have moved while the preview was building).
          ref: ${{ github.event.deployment.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run integration tests against preview
        env:
          BASE_URL: ${{ github.event.deployment_status.environment_url }}/v1
          API_KEY: ${{ secrets.API_KEY }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: bash tests/integration-tests.sh

      # Two-call live regression for the prompt-caching feature (see
      # tests/live/cache-hit.test.ts). Burns a small amount of real OAuth
      # quota on every preview — the payload uses Haiku + ~5 KB filler to
      # clear the 4096-token cacheable-prefix minimum while keeping cost
      # close to the noise floor. Runs after the main integration suite
      # so auth/bypass/env-var failures surface there first.
      #
      # Non-blocking on its own failure: the signal we actually care about
      # is `cache_read_input_tokens > 0` on call 2, and we want the job
      # log for diagnosis even when the assertion fails. Hence
      # `continue-on-error: true` — but the step still shows red in the
      # PR checks summary, so a regression is visible.
      - name: Cache-hit live regression (two-call pattern)
        if: always()
        continue-on-error: true
        env:
          PROXY_URL: ${{ github.event.deployment_status.environment_url }}
          PROBE_API_KEY: ${{ secrets.API_KEY }}
          PROBE_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          LIVE_TESTS: '1'
        run: |
          npm ci
          npm run test:live

  prod-smoke:
    name: Proxy smoke tests (production)
    # Only react to successful Vercel Production deployments. Runs the
    # same script with SMOKE_ONLY=1 so Claude-calling tests are skipped
    # (auth/status, /v1/models, /api/clients only). This catches prod
    # env-var drift without consuming OAuth quota.
    if: >-
      github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Run smoke tests against production
        env:
          # Use the stable public production alias, NOT the per-deploy URL
          # that `github.event.deployment_status.environment_url` yields.
          # Per-deploy URLs (e.g. `...-mpjpqhx1b.vercel.app`) sit behind
          # Vercel Deployment Protection even for production — the script
          # detects the SSO challenge and bails. The aliased URL is the
          # one Cursor and other real clients hit, so it's the correct
          # target for a smoke test anyway.
          BASE_URL: https://elzinko-cursor-claude-connector.vercel.app/v1
          API_KEY: ${{ secrets.API_KEY }}
          SMOKE_ONLY: '1'
        run: bash tests/integration-tests.sh
