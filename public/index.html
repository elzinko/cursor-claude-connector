<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Proxy — Status & Auth</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --background: 48 33.3333% 97.0588%;
        --foreground: 48 19.6078% 20%;
        --card: 48 33.3333% 97.0588%;
        --card-foreground: 60 2.5641% 7.6471%;
        --popover: 0 0% 100%;
        --popover-foreground: 50.7692 19.403% 13.1373%;
        --primary: 15.1111 55.5556% 52.3529%;
        --primary-foreground: 0 0% 100%;
        --secondary: 46.1538 22.807% 88.8235%;
        --secondary-foreground: 50.7692 8.4967% 30%;
        --muted: 44 29.4118% 90%;
        --muted-foreground: 50 2.3622% 50.1961%;
        --accent: 46.1538 22.807% 88.8235%;
        --accent-foreground: 50.7692 19.403% 13.1373%;
        --destructive: 0 60% 45%;
        --destructive-foreground: 0 0% 100%;
        --success: 142 55% 40%;
        --border: 50 7.5% 84.3137%;
        --input: 50.7692 7.9755% 68.0392%;
        --ring: 210 74.8031% 49.8039%;
        --radius: 0.5rem;
        --shadow-sm: 0 1px 3px 0px hsl(0 0% 0% / 0.08);
        --shadow: 0 1px 3px 0px hsl(0 0% 0% / 0.1),
          0 1px 2px -1px hsl(0 0% 0% / 0.1);
        --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas,
          monospace;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: 60 2.7027% 14.5098%;
          --foreground: 46.1538 9.7744% 73.9216%;
          --card: 60 2.7027% 14.5098%;
          --card-foreground: 48 33.3333% 97.0588%;
          --popover: 60 2.1277% 18.4314%;
          --popover-foreground: 60 5.4545% 89.2157%;
          --primary: 14.7692 63.1068% 59.6078%;
          --primary-foreground: 0 0% 100%;
          --secondary: 48 33.3333% 97.0588%;
          --secondary-foreground: 60 2.1277% 18.4314%;
          --muted: 60 3.8462% 10.1961%;
          --muted-foreground: 51.4286 8.8608% 69.0196%;
          --accent: 48 10.6383% 9.2157%;
          --accent-foreground: 51.4286 25.9259% 94.7059%;
          --destructive: 0 70% 55%;
          --destructive-foreground: 0 0% 100%;
          --success: 142 50% 55%;
          --border: 60 5.0847% 23.1373%;
          --input: 52.5 5.1282% 30.5882%;
          --ring: 210 74.8031% 49.8039%;
        }
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: var(--font-sans);
        background: hsl(var(--background));
        color: hsl(var(--foreground));
        min-height: 100vh;
        padding: 2rem 1rem;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .page {
        max-width: 40rem;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      header h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        margin-bottom: 0.25rem;
      }

      header p {
        color: hsl(var(--muted-foreground));
        font-size: 0.875rem;
      }

      .section {
        background: hsl(var(--card));
        border: 1px solid hsl(var(--border));
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        padding: 1.25rem 1.5rem;
      }

      .section-title {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: hsl(var(--muted-foreground));
        margin-bottom: 0.875rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .section-title .refresh-btn {
        background: transparent;
        border: none;
        color: hsl(var(--muted-foreground));
        cursor: pointer;
        padding: 0.25rem;
        border-radius: calc(var(--radius) - 4px);
        display: inline-flex;
        align-items: center;
        transition: all 150ms ease;
      }

      .section-title .refresh-btn:hover {
        color: hsl(var(--foreground));
        background: hsl(var(--accent));
      }

      .section-title .refresh-btn i { width: 14px; height: 14px; }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }

      .stat-card {
        background: hsl(var(--muted) / 0.5);
        border: 1px solid hsl(var(--border));
        border-radius: calc(var(--radius) - 2px);
        padding: 0.75rem 0.875rem;
      }

      .stat-card .label {
        font-size: 0.75rem;
        color: hsl(var(--muted-foreground));
        margin-bottom: 0.25rem;
        display: flex;
        align-items: center;
        gap: 0.375rem;
      }

      .stat-card .label i { width: 12px; height: 12px; }

      .stat-card .value {
        font-size: 0.95rem;
        font-weight: 500;
        color: hsl(var(--foreground));
        font-variant-numeric: tabular-nums;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.8125rem;
        font-weight: 500;
      }

      .badge i { width: 12px; height: 12px; }
      .badge.ok { background: hsl(var(--success) / 0.15); color: hsl(var(--success)); }
      .badge.ko { background: hsl(var(--destructive) / 0.12); color: hsl(var(--destructive)); }
      .badge.warn { background: hsl(var(--primary) / 0.12); color: hsl(var(--primary)); }

      .button-primary {
        background: hsl(var(--primary));
        color: hsl(var(--primary-foreground));
        border: none;
        border-radius: calc(var(--radius) - 2px);
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        transition: all 150ms ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .button-primary:hover:not(:disabled) {
        background: hsl(var(--primary) / 0.9);
        transform: translateY(-1px);
      }

      .button-primary:disabled {
        background: hsl(var(--muted));
        color: hsl(var(--muted-foreground));
        cursor: not-allowed;
      }

      .button-primary i { width: 16px; height: 16px; }

      .button-secondary {
        background: transparent;
        color: hsl(var(--foreground));
        border: 1px solid hsl(var(--border));
        border-radius: calc(var(--radius) - 2px);
        padding: 0.5rem 0.875rem;
        font-size: 0.8125rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 150ms ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.375rem;
      }

      .button-secondary:hover { background: hsl(var(--accent)); }
      .button-secondary i { width: 14px; height: 14px; }

      .auth-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .auth-row p {
        font-size: 0.875rem;
        color: hsl(var(--muted-foreground));
      }

      .input-group { margin-bottom: 0.75rem; }

      .input-group label {
        display: block;
        margin-bottom: 0.375rem;
        font-size: 0.8125rem;
        font-weight: 500;
      }

      .input-group input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        background: hsl(var(--background));
        border: 1px solid hsl(var(--input));
        border-radius: calc(var(--radius) - 2px);
        font-size: 0.875rem;
        color: hsl(var(--foreground));
        font-family: var(--font-mono);
      }

      .input-group input:focus {
        outline: none;
        border-color: hsl(var(--ring));
        box-shadow: 0 0 0 3px hsl(var(--ring) / 0.2);
      }

      .json-output {
        margin-top: 1rem;
        background: hsl(var(--muted) / 0.4);
        border: 1px solid hsl(var(--border));
        border-radius: calc(var(--radius) - 2px);
        padding: 0.875rem;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        line-height: 1.5;
        color: hsl(var(--foreground));
        overflow-x: auto;
        white-space: pre;
        max-height: 24rem;
        overflow-y: auto;
      }

      .error-inline {
        color: hsl(var(--destructive));
        font-size: 0.8125rem;
        margin-top: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.375rem;
      }

      .error-inline i { width: 14px; height: 14px; }

      .hidden { display: none !important; }

      .loading-spinner {
        display: inline-block;
        width: 0.875rem;
        height: 0.875rem;
        border: 2px solid hsl(var(--primary-foreground) / 0.3);
        border-radius: 50%;
        border-top-color: hsl(var(--primary-foreground));
        animation: spin 1s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .curl-hint {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: hsl(var(--muted-foreground));
        background: hsl(var(--muted) / 0.5);
        padding: 0.5rem 0.75rem;
        border-radius: calc(var(--radius) - 2px);
        margin-top: 0.75rem;
        overflow-x: auto;
        white-space: nowrap;
      }

      .warnings { margin-bottom: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }

      .warning-item {
        border-radius: calc(var(--radius) - 2px);
        padding: 0.75rem 0.875rem;
        font-size: 0.8125rem;
        line-height: 1.5;
        display: flex;
        gap: 0.5rem;
        align-items: flex-start;
      }

      .warning-item i { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }
      .warning-item .msg { font-weight: 500; margin-bottom: 0.25rem; }
      .warning-item .fix { color: hsl(var(--muted-foreground)); font-weight: 400; }

      .warning-item.error {
        background: hsl(var(--destructive) / 0.08);
        border: 1px solid hsl(var(--destructive) / 0.25);
        color: hsl(var(--destructive));
      }
      .warning-item.warning {
        background: hsl(var(--primary) / 0.08);
        border: 1px solid hsl(var(--primary) / 0.25);
        color: hsl(var(--primary));
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <h1>Claude Proxy</h1>
        <p>OAuth status, sign-in and full dashboard</p>
      </header>

      <section class="section">
        <div class="section-title">
          <span>Proxy status</span>
          <button class="refresh-btn" onclick="refreshStatus()" aria-label="Refresh">
            <i data-lucide="refresh-cw"></i>
          </button>
        </div>
        <div id="warnings" class="warnings hidden"></div>
        <div class="status-grid" id="statusGrid">
          <div class="stat-card"><div class="label"><i data-lucide="shield"></i>Auth</div><div class="value" id="statAuth">…</div></div>
          <div class="stat-card"><div class="label"><i data-lucide="clock"></i>Expires in</div><div class="value" id="statExpires">…</div></div>
          <div class="stat-card"><div class="label"><i data-lucide="database"></i>Storage</div><div class="value" id="statStorage">…</div></div>
          <div class="stat-card"><div class="label"><i data-lucide="key"></i>API key</div><div class="value" id="statApiKey">…</div></div>
          <div class="stat-card"><div class="label"><i data-lucide="cloud"></i>Platform</div><div class="value" id="statPlatform">…</div></div>
          <div class="stat-card"><div class="label"><i data-lucide="git-branch"></i>Env</div><div class="value" id="statEnv">…</div></div>
        </div>
        <div class="curl-hint">curl <span id="baseUrl"></span>/auth/status</div>
      </section>

      <section class="section" id="authSection">
        <div class="section-title"><span>Claude sign-in</span></div>

        <div id="unauthenticatedView" class="hidden">
          <button id="startAuthBtn" class="button-primary" onclick="startAuth()">
            <i data-lucide="key-round"></i>
            <span id="btnText">Connect with Claude</span>
          </button>
          <div class="input-group" style="margin-top: 1rem;">
            <label for="authCode">Paste OAuth code (manual fallback)</label>
            <input type="text" id="authCode" placeholder="code#verifier" />
          </div>
          <button class="button-secondary" style="width: 100%;" onclick="submitCode()">
            <i data-lucide="check"></i>Submit code
          </button>
        </div>

        <div id="authenticatedView" class="hidden auth-row">
          <p>Signed in — tokens stored server-side, available to EC2 clients</p>
          <button class="button-secondary" onclick="logout()">
            <i data-lucide="log-out"></i>Sign out
          </button>
        </div>

        <div id="authError" class="error-inline hidden">
          <i data-lucide="alert-circle"></i><span id="authErrorText"></span>
        </div>
      </section>

      <section class="section">
        <div class="section-title"><span>Full dashboard (API key required)</span></div>
        <div class="input-group">
          <label for="apiKeyInput">API key</label>
          <input type="password" id="apiKeyInput" placeholder="Bearer token" autocomplete="off" />
        </div>
        <button class="button-secondary" style="width: 100%;" onclick="loadFullStatus()">
          <i data-lucide="eye"></i>Fetch /api/status/full
        </button>
        <pre class="json-output hidden" id="jsonOutput"></pre>
        <div id="jsonError" class="error-inline hidden">
          <i data-lucide="alert-circle"></i><span id="jsonErrorText"></span>
        </div>
      </section>
    </div>

    <script>
      lucide.createIcons()

      let authWindow = null
      let authCheckInterval = null
      let currentSessionId = null

      document.getElementById('baseUrl').textContent = window.location.origin

      function formatDuration(seconds) {
        if (seconds == null) return '—'
        if (seconds <= 0) return 'expired'
        const h = Math.floor(seconds / 3600)
        const m = Math.floor((seconds % 3600) / 60)
        if (h > 0) return `${h}h ${m}m`
        if (m > 0) return `${m}m ${seconds % 60}s`
        return `${seconds}s`
      }

      function renderStatus(data) {
        const authEl = document.getElementById('statAuth')
        if (data.authenticated) {
          authEl.innerHTML = '<span class="badge ok"><i data-lucide="check"></i>connected</span>'
        } else {
          authEl.innerHTML = '<span class="badge ko"><i data-lucide="x"></i>disconnected</span>'
        }

        document.getElementById('statExpires').textContent = formatDuration(data.expiresInSeconds)

        const storageEl = document.getElementById('statStorage')
        const mode = data.storageMode || '—'
        const isVercelFile = data.deployment?.platform === 'vercel' && mode === 'file'
        storageEl.innerHTML = isVercelFile
          ? `<span class="badge ko"><i data-lucide="alert-triangle"></i>${mode} (broken)</span>`
          : mode === 'redis'
          ? `<span class="badge ok"><i data-lucide="database"></i>redis</span>`
          : `<span class="badge">${mode}</span>`

        const apiKeyEl = document.getElementById('statApiKey')
        apiKeyEl.innerHTML = data.apiKeyConfigured
          ? '<span class="badge ok"><i data-lucide="check"></i>configured</span>'
          : '<span class="badge ko"><i data-lucide="alert-triangle"></i>not set</span>'

        const platformEl = document.getElementById('statPlatform')
        const platform = data.deployment?.platform || 'local'
        platformEl.innerHTML = platform === 'vercel'
          ? '<span class="badge ok"><i data-lucide="cloud"></i>vercel</span>'
          : '<span class="badge"><i data-lucide="laptop"></i>local</span>'

        document.getElementById('statEnv').textContent =
          data.deployment?.vercelEnv || data.deployment?.region || '—'

        renderWarnings(data.deployment?.warnings || [])

        const auth = document.getElementById('authenticatedView')
        const unauth = document.getElementById('unauthenticatedView')
        auth.classList.toggle('hidden', !data.authenticated)
        unauth.classList.toggle('hidden', data.authenticated)

        lucide.createIcons()
      }

      function renderWarnings(list) {
        const box = document.getElementById('warnings')
        if (!list.length) {
          box.classList.add('hidden')
          box.innerHTML = ''
          return
        }
        box.classList.remove('hidden')
        box.innerHTML = list
          .map((w) => {
            const icon = w.severity === 'error' ? 'alert-octagon' : 'alert-triangle'
            return `<div class="warning-item ${w.severity}">
              <i data-lucide="${icon}"></i>
              <div>
                <div class="msg">${escapeHtml(w.message)}</div>
                <div class="fix">${escapeHtml(w.remediation)}</div>
              </div>
            </div>`
          })
          .join('')
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
      }

      async function refreshStatus() {
        try {
          const res = await fetch('/auth/status')
          renderStatus(await res.json())
        } catch (err) {
          showAuthError('Failed to fetch status')
        }
      }

      async function startAuth() {
        const btn = document.getElementById('startAuthBtn')
        const btnText = document.getElementById('btnText')
        btn.disabled = true
        btnText.innerHTML = '<span class="loading-spinner"></span>Connecting…'
        hideAuthError()

        try {
          const res = await fetch('/auth/oauth/start', { method: 'POST' })
          const data = await res.json()
          if (!data.authUrl) throw new Error('No auth URL received')

          currentSessionId = data.sessionId
          authWindow = window.open(data.authUrl, 'claude-auth', 'width=600,height=700')

          authCheckInterval = setInterval(async () => {
            if (authWindow && authWindow.closed) {
              clearInterval(authCheckInterval)
              btn.disabled = false
              btnText.textContent = 'Connect with Claude'
              await refreshStatus()
            }
          }, 1000)

          btnText.innerHTML = '<i data-lucide="external-link" style="width:16px;height:16px;"></i> Waiting for authentication…'
          lucide.createIcons()
        } catch (err) {
          showAuthError('Failed to start authentication')
          btn.disabled = false
          btnText.textContent = 'Connect with Claude'
        }
      }

      async function submitCode() {
        const input = document.getElementById('authCode')
        const code = input.value.trim()
        if (!code) { showAuthError('Paste an OAuth code first'); return }

        try {
          const body = { code, ...(currentSessionId && { sessionId: currentSessionId }) }
          const res = await fetch('/auth/oauth/callback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          })
          const data = await res.json()
          if (data.success) {
            input.value = ''
            hideAuthError()
            await refreshStatus()
          } else {
            showAuthError(data.message || 'Authentication failed')
          }
        } catch (err) {
          showAuthError('Failed to submit code')
        }
      }

      async function logout() {
        try {
          await fetch('/auth/logout', { method: 'POST' })
          await refreshStatus()
        } catch (err) {
          showAuthError('Failed to sign out')
        }
      }

      async function loadFullStatus() {
        const key = document.getElementById('apiKeyInput').value.trim()
        const out = document.getElementById('jsonOutput')
        const err = document.getElementById('jsonError')
        err.classList.add('hidden')

        if (!key) { showJsonError('Enter the API key'); return }

        try {
          const res = await fetch('/api/status/full', {
            headers: { Authorization: `Bearer ${key}` },
          })
          const data = await res.json()
          if (!res.ok) {
            showJsonError(data.message || `HTTP ${res.status}`)
            return
          }
          out.textContent = JSON.stringify(data, null, 2)
          out.classList.remove('hidden')
        } catch (error) {
          showJsonError('Request failed')
        }
      }

      function showAuthError(msg) {
        document.getElementById('authErrorText').textContent = msg
        document.getElementById('authError').classList.remove('hidden')
      }
      function hideAuthError() {
        document.getElementById('authError').classList.add('hidden')
      }
      function showJsonError(msg) {
        document.getElementById('jsonErrorText').textContent = msg
        document.getElementById('jsonError').classList.remove('hidden')
      }

      window.addEventListener('message', async (event) => {
        if (event.data?.type === 'oauth-callback' && event.data.code) {
          document.getElementById('authCode').value = event.data.code
          await submitCode()
          if (authWindow && !authWindow.closed) authWindow.close()
        }
      })

      refreshStatus()
      setInterval(refreshStatus, 30000)
    </script>
  </body>
</html>
